<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 100px;
      background: #0a0a14;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      font-size: 13px;
    }

    /* Auth */
    .auth-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(0, 212, 100, 0.06);
      border-bottom: 1px solid rgba(0, 212, 100, 0.12);
    }

    .auth-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .auth-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .auth-email {
      font-size: 11px;
      color: #00d464;
    }

    .auth-logout-btn {
      padding: 2px 8px;
      background: none;
      color: #666;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
    }

    .auth-logout-btn:hover { color: #ff4757; border-color: rgba(255,71,87,0.2); }

    .login-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(0, 212, 255, 0.04);
      border-bottom: 1px solid rgba(0, 212, 255, 0.08);
    }

    .login-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .login-btn:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

    .login-hint {
      font-size: 10px;
      color: #555;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.06), rgba(120, 0, 255, 0.04));
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: white;
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-text p {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    /* Main content */
    .content {
      padding: 14px 18px;
    }

    /* Quick translate area */
    .quick-translate {
      margin-bottom: 14px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 72px;
      padding: 10px 12px;
      background: #12121f;
      color: #e8e8e8;
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: rgba(0, 212, 255, 0.4);
    }

    textarea::placeholder {
      color: #444;
    }

    .result-area {
      min-height: 36px;
      padding: 10px 12px;
      background: #12121f;
      border: 1px solid rgba(0, 212, 255, 0.08);
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      display: none;
    }

    .result-area.visible {
      display: block;
    }

    .result-area .timer {
      font-size: 10px;
      color: #555;
      margin-top: 6px;
    }

    .result-area .error {
      color: #ff4757;
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    select {
      flex: 1;
      padding: 7px 10px;
      background: #12121f;
      color: #e8e8e8;
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: rgba(0, 212, 255, 0.4);
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      transform: none;
      cursor: not-allowed;
    }

    .swap-btn {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      border: 1px solid rgba(0, 212, 255, 0.15);
      width: 30px;
      padding: 7px 0;
      text-align: center;
      font-size: 14px;
    }

    .swap-btn:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(0, 212, 255, 0.08);
      margin: 14px 0;
    }

    /* Settings */
    .settings-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 10px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .setting-row label {
      font-size: 12px;
      color: #999;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      background: #12121f;
      color: #e8e8e8;
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: rgba(0, 212, 255, 0.4);
    }

    .api-key-row {
      position: relative;
      margin-bottom: 10px;
    }

    .api-key-row input {
      padding-right: 60px;
    }

    .api-key-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      font-size: 11px;
      cursor: pointer;
    }

    .api-key-toggle:hover {
      color: #00d4ff;
    }

    .status {
      font-size: 11px;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      margin-top: 6px;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(0, 212, 100, 0.1);
      color: #00d464;
    }

    .status.error {
      display: block;
      background: rgba(255, 71, 87, 0.1);
      color: #ff4757;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #1a1a2e;
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 20px;
      transition: all 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      top: 2px;
      background: #555;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(0, 212, 255, 0.2);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: #00d4ff;
    }

    /* Open page button */
    .btn-open-page {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(120, 0, 255, 0.06));
      color: #00d4ff;
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 10px;
    }

    .btn-open-page:hover {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.14), rgba(120, 0, 255, 0.1));
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(0, 212, 255, 0.15);
    }

    /* Shortcuts */
    .shortcuts {
      margin-top: 10px;
      padding: 8px 10px;
      background: rgba(0, 212, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.06);
    }

    .shortcut {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 11px;
      color: #777;
    }

    kbd {
      padding: 1px 5px;
      background: #1a1a2e;
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 4px;
      font-size: 10px;
      font-family: inherit;
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">翻</div>
    <div class="header-text">
      <h1>Hayaku Translate</h1>
      <p>Gemini搭載 爆速翻訳</p>
    </div>
  </div>

  <!-- Auth Banner -->
  <div id="authBanner" class="auth-banner" style="display:none;">
    <div class="auth-info">
      <img id="authAvatar" class="auth-avatar" src="" alt="">
      <span id="authEmail" class="auth-email"></span>
    </div>
    <button class="auth-logout-btn" id="logoutBtn">ログアウト</button>
  </div>
  <div id="loginBanner" class="login-banner" style="display:none;">
    <button class="login-btn" id="loginBtn">
      <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </button>
    <span class="login-hint">APIキー不要で使えます</span>
  </div>

  <div class="content">
    <!-- Quick Translate -->
    <div class="quick-translate">
      <div class="input-wrap">
        <textarea id="inputText" placeholder="翻訳するテキストを入力..."></textarea>
      </div>
      <div class="controls">
        <select id="sourceLang">
          <option value="auto">自動検出</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
        </select>
        <button class="btn swap-btn" id="swapBtn" title="言語を入れ替え">⇄</button>
        <select id="targetLang">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
        </select>
        <button class="btn btn-primary" id="translateBtn">翻訳</button>
      </div>
      <div class="result-area" id="resultArea"></div>
    </div>

    <div class="divider"></div>

    <!-- Settings -->
    <div class="settings-section">
      <h3>設定</h3>

      <div class="api-key-row">
        <input type="password" id="apiKey" placeholder="Gemini APIキー">
        <button class="api-key-toggle" id="toggleKey">表示</button>
      </div>

      <div class="api-key-row">
        <input type="text" id="workerUrl" placeholder="Worker URL（チーム配布用）" style="font-size:11px;">
      </div>

      <div class="api-key-row">
        <input type="text" id="gatewayUrl" placeholder="Cloudflare AI Gateway URL（任意）" style="font-size:11px;">
      </div>

      <div class="setting-row">
        <label>モデル</label>
        <select id="modelSelect" style="width: 200px;">
          <option value="gemini-3.1-flash-lite-preview">3.1 Flash Lite (最速 382tok/s)</option>
          <option value="gemini-2.5-flash-lite">2.5 Flash Lite (高速・安定)</option>
          <option value="gemini-2.5-flash">2.5 Flash (バランス)</option>
          <option value="gemini-3-flash-preview">3 Flash (高品質・高速)</option>
          <option value="gemini-3.1-pro-preview">3.1 Pro (最高品質)</option>
        </select>
      </div>

      <div class="setting-row">
        <label>ダブルクリックで翻訳</label>
        <label class="toggle">
          <input type="checkbox" id="dblclickToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div id="statusMsg" class="status"></div>
    </div>

    <button class="btn-open-page" id="openPageBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      フルページで開く
    </button>

    <div class="shortcuts">
      <div class="shortcut">
        <span>選択テキスト翻訳</span>
        <kbd>Alt + T</kbd>
      </div>
      <div class="shortcut">
        <span>ページ翻訳</span>
        <kbd>Alt + Shift + T</kbd>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
