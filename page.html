<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hayaku Translate</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00d4ff;
      --purple: #7b2ff7;
      --purple-light: #a855f7;
      --bg-deep: #06060e;
      --bg: #0a0a14;
      --bg-card: #0f0f1a;
      --bg-input: #12121f;
      --border: rgba(0, 212, 255, 0.12);
      --border-focus: rgba(0, 212, 255, 0.4);
      --border-purple: rgba(168, 85, 247, 0.2);
      --text: #e8e8e8;
      --text-dim: #888;
      --text-muted: #555;
      --danger: #ff4757;
      --success: #00d464;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== Layout ===== */
    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: white;
      font-size: 22px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0, 212, 255, 0.15);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ===== Shared Controls ===== */
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 212, 255, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.35;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-ghost {
      background: rgba(0, 212, 255, 0.06);
      color: var(--cyan);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: rgba(0, 212, 255, 0.12);
      border-color: var(--border-focus);
    }

    .btn-purple {
      background: rgba(168, 85, 247, 0.1);
      color: var(--purple-light);
      border: 1px solid var(--border-purple);
    }

    .btn-purple:hover {
      background: rgba(168, 85, 247, 0.18);
    }

    .btn-purple:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    select {
      padding: 8px 12px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--border-focus); }

    textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--border-focus); }
    textarea::placeholder { color: var(--text-muted); }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--border-focus); }

    /* ===== Main Grid ===== */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.04), rgba(120, 0, 255, 0.03));
      border-bottom: 1px solid var(--border);
    }

    .card-header-purple {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.04), rgba(120, 0, 255, 0.03));
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
    }

    .card-label-cyan { color: var(--cyan); }
    .card-label-purple { color: var(--purple-light); }

    .card-body {
      padding: 16px;
    }

    .card-body textarea {
      min-height: 180px;
    }

    /* ===== Language bar ===== */
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .lang-bar select { flex: 1; }

    .swap-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      color: var(--cyan);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .swap-btn:hover {
      background: rgba(0, 212, 255, 0.08);
      border-color: var(--border-focus);
      transform: rotate(180deg);
    }

    .translate-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .timer {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ===== Translation result ===== */
    .result-area {
      min-height: 180px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      font-size: 15px;
      color: var(--text);
    }

    .result-area:empty::before {
      content: '翻訳結果がここに表示されます';
      color: var(--text-muted);
    }

    .result-area .error { color: var(--danger); font-size: 13px; }

    /* Skeleton loading */
    .skeleton {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skeleton-line {
      height: 16px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.04) 25%, rgba(0, 212, 255, 0.1) 50%, rgba(0, 212, 255, 0.04) 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .result-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== Reply Section ===== */
    .reply-section {
      margin-top: 24px;
      display: none;
    }

    .reply-section.visible { display: block; }

    .reply-thread {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .reply-thread::-webkit-scrollbar { width: 4px; }
    .reply-thread::-webkit-scrollbar-track { background: transparent; }
    .reply-thread::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.2); border-radius: 4px; }

    .reply-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      animation: bubble-in 0.2s ease-out;
    }

    @keyframes bubble-in {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .reply-user {
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.1);
      color: var(--text-dim);
      font-size: 13px;
      align-self: flex-end;
      max-width: 80%;
      border-radius: 14px 14px 4px 14px;
    }

    .reply-ai {
      background: rgba(168, 85, 247, 0.06);
      border: 1px solid rgba(168, 85, 247, 0.12);
      color: var(--text);
      align-self: flex-start;
      max-width: 90%;
      border-radius: 14px 14px 14px 4px;
    }

    .reply-ai-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(168, 85, 247, 0.1);
    }

    .reply-ai-actions button {
      padding: 3px 10px;
      background: rgba(168, 85, 247, 0.08);
      color: var(--purple-light);
      border: 1px solid rgba(168, 85, 247, 0.15);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .reply-ai-actions button:hover {
      background: rgba(168, 85, 247, 0.16);
    }

    .reply-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .reply-input-row textarea {
      flex: 1;
      min-height: 52px;
      max-height: 160px;
      border-color: var(--border-purple);
      font-size: 14px;
    }

    .reply-input-row textarea:focus {
      border-color: rgba(168, 85, 247, 0.5);
    }

    .reply-send {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--purple-light), var(--purple));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .reply-send:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(168, 85, 247, 0.3);
    }

    .reply-send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ===== Spinner ===== */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 212, 255, 0.15);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .spinner-purple {
      border-color: rgba(168, 85, 247, 0.15);
      border-top-color: var(--purple-light);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Settings (collapsible) ===== */
    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s;
    }

    .settings-toggle:hover { color: var(--cyan); }

    .settings-toggle .arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .settings-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .settings-panel {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .settings-panel.visible { display: block; }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .setting-item label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .setting-item.full-width {
      grid-column: 1 / -1;
    }

    .api-key-wrap {
      position: relative;
    }

    .api-key-wrap input { padding-right: 56px; }

    .api-key-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }

    .api-key-btn:hover { color: var(--cyan); }

    .status-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 24px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }

    .status-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status-toast.success {
      background: rgba(0, 212, 100, 0.15);
      border: 1px solid rgba(0, 212, 100, 0.3);
      color: var(--success);
    }

    .status-toast.error {
      background: rgba(255, 71, 87, 0.15);
      border: 1px solid rgba(255, 71, 87, 0.3);
      color: var(--danger);
    }

    /* ===== Responsive ===== */
    @media (max-width: 700px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .settings-grid {
        grid-template-columns: 1fr;
      }

      .app {
        padding: 0 14px 40px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">翻</div>
        <div>
          <h1>Hayaku Translate</h1>
          <p>Gemini搭載 爆速翻訳</p>
        </div>
      </div>
      <div class="header-right">
        <div id="authArea" style="display:flex; align-items:center; gap:10px;">
          <!-- Authenticated -->
          <div id="authInfo" style="display:none; align-items:center; gap:8px;">
            <img id="authAvatar" src="" style="width:24px; height:24px; border-radius:50%;" alt="">
            <span id="authEmail" style="font-size:12px; color:var(--success);"></span>
            <button class="btn btn-ghost" id="logoutBtn" style="padding:3px 8px; font-size:11px;">ログアウト</button>
          </div>
          <!-- Not authenticated -->
          <button class="btn" id="loginBtn" style="display:none; padding:6px 14px; background:#fff; color:#333; border:1px solid #ddd; font-size:12px; gap:6px;">
            <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Googleでログイン
          </button>
        </div>
        <button class="settings-toggle" id="settingsToggle">
          <span class="arrow">&#9654;</span> 設定
        </button>
      </div>
    </div>

    <!-- Settings Panel (collapsed by default) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-grid">
        <div class="setting-item full-width">
          <label>Gemini API キー</label>
          <div class="api-key-wrap">
            <input type="password" id="apiKey" placeholder="AIza...">
            <button class="api-key-btn" id="toggleKey">表示</button>
          </div>
        </div>
        <div class="setting-item full-width">
          <label>Worker URL（チーム配布用・Google認証）</label>
          <input type="text" id="workerUrl" placeholder="https://hayaku-translate.your-account.workers.dev">
        </div>
        <div class="setting-item full-width">
          <label>Cloudflare AI Gateway URL（任意）</label>
          <input type="text" id="gatewayUrl" placeholder="https://gateway.ai.cloudflare.com/v1/{account}/{gateway}">
        </div>
        <div class="setting-item">
          <label>モデル</label>
          <select id="modelSelect">
            <option value="gemini-3.1-flash-lite-preview">3.1 Flash Lite (最速)</option>
            <option value="gemini-2.5-flash-lite">2.5 Flash Lite (高速・安定)</option>
            <option value="gemini-2.5-flash">2.5 Flash (バランス)</option>
            <option value="gemini-3-flash-preview">3 Flash (高品質)</option>
            <option value="gemini-3.1-pro-preview">3.1 Pro (最高品質)</option>
          </select>
        </div>
        <div class="setting-item">
          <label>デフォルト翻訳先</label>
          <select id="defaultTargetLang">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Language Bar -->
    <div class="lang-bar">
      <select id="sourceLang">
        <option value="auto">自動検出</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="ko">한국어</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="it">Italiano</option>
        <option value="hi">हिन्दी</option>
      </select>
      <button class="swap-btn" id="swapBtn" title="入れ替え">&#8644;</button>
      <select id="targetLang">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ko">한국어</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="it">Italiano</option>
        <option value="hi">हिन्दी</option>
      </select>
    </div>

    <!-- Main Translation Grid -->
    <div class="main-grid">
      <!-- Input -->
      <div class="card">
        <div class="card-header">
          <span class="card-label card-label-cyan">原文</span>
          <button class="btn btn-ghost" id="clearBtn" style="padding:4px 10px; font-size:11px;">クリア</button>
        </div>
        <div class="card-body">
          <textarea id="inputText" placeholder="翻訳するテキストを貼り付け...&#10;&#10;Cmd+Enter で翻訳" rows="8"></textarea>
          <div class="translate-actions">
            <span class="timer" id="timerDisplay"></span>
            <button class="btn btn-primary" id="translateBtn">
              翻訳
            </button>
          </div>
        </div>
      </div>

      <!-- Output -->
      <div class="card">
        <div class="card-header">
          <span class="card-label card-label-cyan">翻訳</span>
          <span class="spinner" id="loadingSpinner" style="display:none;"></span>
        </div>
        <div class="card-body">
          <div class="result-area" id="resultArea"></div>
          <div class="result-actions" id="resultActions" style="display:none;">
            <button class="btn btn-ghost" id="copyResultBtn" style="font-size:12px; padding:5px 12px;">コピー</button>
            <button class="btn btn-purple" id="replyBtn" style="font-size:12px; padding:5px 12px;">返信を書く</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reply Section -->
    <div class="reply-section" id="replySection">
      <div class="card">
        <div class="card-header card-header-purple">
          <span class="card-label card-label-purple">返信を作成</span>
          <button class="btn btn-ghost" id="closeReply" style="padding:3px 8px; font-size:11px; color:var(--text-muted);">閉じる</button>
        </div>
        <div class="card-body">
          <div class="reply-thread" id="replyThread"></div>
          <div class="reply-input-row">
            <textarea id="replyInput" placeholder="返信したい内容を入力（日本語OK）...&#10;Cmd+Enter で送信" rows="2"></textarea>
